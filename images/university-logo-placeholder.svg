<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2f3f"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#logoGrad)" stroke-width="4"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(0,180,216,0.3)" stroke-width="2"/>

  <!-- Book/University symbol -->
  <path d="M50 120 L100 90 L150 120 L150 140 L100 110 L50 140 Z" fill="url(#logoGrad)" opacity="0.8"/>
  <path d="M50 100 L100 70 L150 100 L150 115 L100 85 L50 115 Z" fill="url(#logoGrad)" opacity="0.6"/>

  <!-- DNA helix inside logo -->
  <path d="M85 50 Q70 70 85 90 Q100 110 85 130" stroke="#00b4d8" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M115 50 Q130 70 115 90 Q100 110 115 130" stroke="#00b4d8" stroke-width="2" fill="none" opacity="0.7"/>
  <line x1="85" y1="70" x2="115" y2="70" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="110" x2="115" y2="110" stroke="#00b4d8" stroke-width="1.5" opacity="0.5"/>

  <!-- Star/Excellence symbols -->
  <circle cx="100" cy="40" r="5" fill="#00b4d8"/>
  <circle cx="60" cy="80" r="3" fill="#00b4d8" opacity="0.6"/>
  <circle cx="140" cy="80" r="3" fill="#00b4d8" opacity="0.6"/>

  <!-- Text placeholder -->
  <text x="100" y="175" text-anchor="middle" fill="#00b4d8" font-size="10" font-family="Arial">UAP</text>
</svg>
