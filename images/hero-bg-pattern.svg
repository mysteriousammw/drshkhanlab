<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#051923"/>
      <stop offset="50%" style="stop-color:#0a2f3f"/>
      <stop offset="100%" style="stop-color:#051923"/>
    </linearGradient>

    <!-- DNA Double Helix Pattern -->
    <pattern id="dnaPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M50 20 Q80 60 50 100 Q20 140 50 180" stroke="rgba(0,180,216,0.1)" fill="none" stroke-width="2"/>
      <path d="M150 20 Q180 60 150 100 Q120 140 150 180" stroke="rgba(0,180,216,0.1)" fill="none" stroke-width="2"/>
      <line x1="50" y1="50" x2="150" y2="50" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>
      <line x1="50" y1="100" x2="150" y2="100" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>
      <line x1="50" y1="150" x2="150" y2="150" stroke="rgba(0,180,216,0.05)" stroke-width="1"/>
      <circle cx="50" cy="50" r="4" fill="rgba(0,180,216,0.15)"/>
      <circle cx="150" cy="50" r="4" fill="rgba(0,180,216,0.15)"/>
      <circle cx="50" cy="100" r="4" fill="rgba(0,180,216,0.15)"/>
      <circle cx="150" cy="100" r="4" fill="rgba(0,180,216,0.15)"/>
      <circle cx="50" cy="150" r="4" fill="rgba(0,180,216,0.15)"/>
      <circle cx="150" cy="150" r="4" fill="rgba(0,180,216,0.15)"/>
    </pattern>

    <!-- Microscope/Lab Icon Pattern -->
    <pattern id="labIcons" x="0" y="0" width="300" height="300" patternUnits="userSpaceOnUse">
      <!-- Test tube icon -->
      <g transform="translate(50,50)" opacity="0.04">
        <rect x="10" y="10" width="20" height="50" rx="3" fill="rgba(0,180,216,0.3)"/>
        <rect x="8" y="5" width="24" height="8" rx="2" fill="rgba(0,180,216,0.3)"/>
        <ellipse cx="20" cy="60" rx="12" ry="6" fill="rgba(0,180,216,0.2)"/>
      </g>
      <!-- Petri dish icon -->
      <g transform="translate(200,100)" opacity="0.04">
        <circle cx="50" cy="50" r="40" fill="rgba(0,180,216,0.1)"/>
        <circle cx="50" cy="50" r="35" stroke="rgba(0,180,216,0.3)" fill="none" stroke-width="2"/>
        <circle cx="50" cy="50" r="15" fill="rgba(0,180,216,0.2)"/>
      </g>
      <!-- DNA helix icon -->
      <g transform="translate(100,200)" opacity="0.04">
        <path d="M20 10 Q40 30 20 50 Q0 70 20 90" stroke="rgba(0,180,216,0.3)" fill="none" stroke-width="3"/>
        <path d="M80 10 Q60 30 80 50 Q100 70 80 90" stroke="rgba(0,180,216,0.3)" fill="none" stroke-width="3"/>
        <line x1="20" y1="30" x2="80" y2="30" stroke="rgba(0,180,216,0.2)" stroke-width="2"/>
        <line x1="20" y1="60" x2="80" y2="60" stroke="rgba(0,180,216,0.2)" stroke-width="2"/>
      </g>
    </pattern>
  </defs>

  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#heroGrad1)"/>

  <!-- DNA pattern overlay -->
  <rect width="1920" height="1080" fill="url(#dnaPattern)"/>

  <!-- Lab icons overlay -->
  <rect width="1920" height="1080" fill="url(#labIcons)"/>

  <!-- Decorative glow circles -->
  <circle cx="300" cy="800" r="300" fill="rgba(0,180,216,0.08)"/>
  <circle cx="1600" cy="300" r="400" fill="rgba(0,180,216,0.06)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(0,180,216,0.03)" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
</svg>
